name: Fetch Latest Lotto

on:
  schedule:
    - cron: '0 12 * * 6'   # 매주 토요일 21:00 KST (UTC+9 = UTC 12:00)
    - cron: '30 12 * * 6'  # 토요일 21:30 KST (발표 후 여유)
  workflow_dispatch:         # 수동 실행 가능

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch lotto result
        run: |
          ROUND=$(python3 -c "
          from datetime import date
          start = date(2002, 12, 7)
          today = date.today()
          print((today - start).days // 7 + 1)
          ")
          echo "Trying round $ROUND"

          fetch_round() {
            curl -sfL "https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=$1" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              --max-time 15
          }

          DATA=$(fetch_round $ROUND)
          if [ -z "$DATA" ] || ! echo "$DATA" | grep -q '"returnValue":"success"'; then
            ROUND=$((ROUND - 1))
            echo "Retrying round $ROUND"
            DATA=$(fetch_round $ROUND)
          fi

          if echo "$DATA" | grep -q '"returnValue":"success"'; then
            mkdir -p data
            echo "$DATA" > data/latest.json
            echo "Saved round $ROUND"
          else
            echo "Response: $DATA"
            echo "Failed to fetch lotto data"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "당첨번호 자동 업데이트 $(date +'%Y-%m-%d')"
            git push
          fi
