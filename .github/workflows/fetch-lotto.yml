name: Fetch Latest Lotto

on:
  schedule:
    - cron: '0 12 * * 6'   # 매주 토요일 21:00 KST
    - cron: '30 12 * * 6'  # 토요일 21:30 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch lotto result
        run: |
          python3 << 'PYEOF'
          import requests
          import json
          import sys
          import re
          import os
          from datetime import date
          from bs4 import BeautifulSoup

          start = date(2002, 12, 7)
          today = date.today()
          round_no = (today - start).days // 7 + 1
          print(f"Target round: {round_no}")

          def valid(nums):
              # 본번호 6개 + 보너스 1개, 전부 1~45, 본번호 중복 없음
              return (len(nums) == 7
                      and all(1 <= n <= 45 for n in nums)
                      and len(set(nums[:6])) == 6)

          def fetch_naver(r):
              url = "https://search.naver.com/search.naver"
              params = {"query": f"로또 {r}회"}
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
                  "Accept-Language": "ko-KR,ko;q=0.9",
                  "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              }
              resp = requests.get(url, params=params, headers=headers, timeout=15)
              resp.encoding = "utf-8"
              print(f"Naver status: {resp.status_code}")
              soup = BeautifulSoup(resp.text, "html.parser")

              # 디버그: 로또 위젯 주변 HTML 저장
              idx = resp.text.find("win_number_box")
              snippet = resp.text[max(0, idx - 3000):idx + 3000] if idx >= 0 else resp.text[:5000]
              with open("data/debug_naver.html", "w", encoding="utf-8") as f:
                  f.write(snippet)

              # 네이버 로또 위젯: .winning_number .ball 6개 + .bonus_number .ball 1개
              area = soup.select_one(".win_area.type_lotto") or soup
              main = [b.get_text(strip=True) for b in area.select(".winning_number .ball")]
              bonus = [b.get_text(strip=True) for b in area.select(".bonus_number .ball")]
              print(f"Balls: main={main} bonus={bonus}")
              if len(main) != 6 or len(bonus) < 1:
                  return None

              nums = [int(x) for x in main + bonus[:1]]
              if not valid(nums):
                  print("Invalid numbers, discarding")
                  return None

              # 위젯에 표시된 회차/추첨일 추출 — "1229회차 (2026.06.20.)"
              shown_round, draw_date = r, ""
              m = re.search(r'(\d{3,4})\s*회차\s*\((\d{4})\.(\d{2})\.(\d{2})', soup.get_text(" "))
              if m:
                  shown_round = int(m.group(1))
                  draw_date = f"{m.group(2)}-{m.group(3)}-{m.group(4)}"
                  print(f"Shown round: {shown_round} ({draw_date})")

              return {"round": shown_round, "date": draw_date, "nums": nums}

          os.makedirs("data", exist_ok=True)

          for r in [round_no, round_no - 1]:
              try:
                  result = fetch_naver(r)
                  if result:
                      nums = result["nums"]
                      data = {
                          "returnValue": "success",
                          "drwNo": result["round"],
                          "drwNoDate": result["date"],
                          "drwtNo1": nums[0], "drwtNo2": nums[1], "drwtNo3": nums[2],
                          "drwtNo4": nums[3], "drwtNo5": nums[4], "drwtNo6": nums[5],
                          "bnusNo": nums[6],
                          "firstWinamnt": 0,
                          "firstPrzwnerCo": 0,
                      }
                      with open("data/latest.json", "w", encoding="utf-8") as f:
                          json.dump(data, f, ensure_ascii=False)
                      print(f"Saved round {result['round']}: {nums}")
                      sys.exit(0)
              except Exception as e:
                  print(f"Error round {r}: {e}")

          print("All attempts failed")
          sys.exit(1)
          PYEOF

      - name: Upload debug html
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: data/debug_naver.html
          if-no-files-found: ignore

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "당첨번호 자동 업데이트 $(date +'%Y-%m-%d')"
            git push
          fi
