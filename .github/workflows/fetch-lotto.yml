name: Fetch Latest Lotto

on:
  schedule:
    - cron: '0 12 * * 6'   # 매주 토요일 21:00 KST
    - cron: '30 12 * * 6'  # 토요일 21:30 KST
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch lotto result
        run: |
          ROUND=$(python3 -c "
          from datetime import date
          start = date(2002, 12, 7)
          today = date.today()
          print((today - start).days // 7 + 1)
          ")
          echo "Trying round $ROUND"

          try_fetch() {
            local r=$1
            # 엔드포인트 1: 동행복권 JSON API
            DATA=$(curl -sL --max-time 15 \
              -H "User-Agent: Mozilla/5.0 (Linux; Android 10) AppleWebKit/537.36" \
              -H "Referer: https://m.dhlottery.co.kr/" \
              "https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=${r}")
            echo "EP1: $DATA"
            if echo "$DATA" | grep -q '"returnValue":"success"'; then
              echo "$DATA"
              return 0
            fi

            # 엔드포인트 2: 동행복권 모바일
            DATA=$(curl -sL --max-time 15 \
              -H "User-Agent: Mozilla/5.0 (Linux; Android 10) AppleWebKit/537.36" \
              "https://m.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=${r}")
            echo "EP2: $DATA"
            if echo "$DATA" | grep -q '"returnValue":"success"'; then
              echo "$DATA"
              return 0
            fi

            return 1
          }

          RAW=$(try_fetch $ROUND)
          DATA=$(echo "$RAW" | grep '"returnValue":"success"' | head -1)

          if [ -z "$DATA" ]; then
            ROUND=$((ROUND - 1))
            echo "Retrying round $ROUND"
            RAW=$(try_fetch $ROUND)
            DATA=$(echo "$RAW" | grep '"returnValue":"success"' | head -1)
          fi

          if [ -n "$DATA" ]; then
            mkdir -p data
            echo "$DATA" > data/latest.json
            echo "Saved: $DATA"
          else
            echo "All endpoints failed"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "당첨번호 자동 업데이트 $(date +'%Y-%m-%d')"
            git push
          fi
