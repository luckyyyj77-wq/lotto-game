name: Fetch Latest Lotto

on:
  schedule:
    - cron: '0 12 * * 6'   # 매주 토요일 21:00 KST
    - cron: '30 12 * * 6'  # 토요일 21:30 KST
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch lotto result
        run: |
          python3 << 'PYEOF'
          import requests
          import json
          import sys
          import re
          from datetime import date

          start = date(2002, 12, 7)
          today = date.today()
          round_no = (today - start).days // 7 + 1

          # 네이버 검색에서 로또 당첨번호 파싱
          def fetch_from_naver(r):
              url = f"https://search.naver.com/search.naver?query=로또+{r}회+당첨번호"
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
                  "Accept-Language": "ko-KR,ko;q=0.9",
              }
              try:
                  resp = requests.get(url, headers=headers, timeout=15)
                  print(f"Naver status: {resp.status_code}")
                  # 네이버 검색 결과에서 번호 추출
                  from bs4 import BeautifulSoup
                  soup = BeautifulSoup(resp.text, "html.parser")
                  # 로또 번호 파싱 (네이버 로또 검색 결과 구조)
                  nums = []
                  balls = soup.select(".lotto_num_wrap .num, .lottoball, [class*='ball']")
                  print(f"Found ball elements: {len(balls)}")
                  for b in balls:
                      t = b.get_text(strip=True)
                      if t.isdigit() and 1 <= int(t) <= 45:
                          nums.append(int(t))
                  print(f"Parsed numbers: {nums}")
                  return nums
              except Exception as e:
                  print(f"Naver error: {e}")
              return []

          # 동행복권 당회차 페이지 직접 파싱 (JSON API 대신 HTML)
          def fetch_from_dh_html(r):
              url = f"https://dhlottery.co.kr/gameResult.do?method=byWin&drwNo={r}"
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                  "Accept": "text/html,application/xhtml+xml",
                  "Accept-Language": "ko-KR,ko;q=0.9",
              }
              try:
                  resp = requests.get(url, headers=headers, timeout=15, allow_redirects=True)
                  print(f"DH HTML status: {resp.status_code}, url: {resp.url}")
                  from bs4 import BeautifulSoup
                  soup = BeautifulSoup(resp.text, "html.parser")
                  # 번호 추출
                  balls = soup.select(".win_result .ball_645, .num.al")
                  print(f"DH balls: {[b.get_text(strip=True) for b in balls]}")
                  nums = [int(b.get_text(strip=True)) for b in balls if b.get_text(strip=True).isdigit()]
                  # 날짜 추출
                  date_el = soup.select_one(".win_result h4")
                  draw_date = date_el.get_text(strip=True) if date_el else ""
                  print(f"Date: {draw_date}, nums: {nums}")
                  if len(nums) >= 7:
                      return {
                          "returnValue": "success",
                          "drwNo": r,
                          "drwNoDate": draw_date,
                          "drwtNo1": nums[0], "drwtNo2": nums[1], "drwtNo3": nums[2],
                          "drwtNo4": nums[3], "drwtNo5": nums[4], "drwtNo6": nums[5],
                          "bnusNo": nums[6],
                          "firstWinamnt": 0,
                          "firstPrzwnerCo": 0,
                      }
              except Exception as e:
                  print(f"DH HTML error: {e}")
              return None

          data = fetch_from_dh_html(round_no) or fetch_from_dh_html(round_no - 1)

          if data:
              import os
              os.makedirs("data", exist_ok=True)
              with open("data/latest.json", "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False)
              print(f"Saved round {data['drwNo']}: {data}")
          else:
              print("All attempts failed")
              sys.exit(1)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "당첨번호 자동 업데이트 $(date +'%Y-%m-%d')"
            git push
          fi
