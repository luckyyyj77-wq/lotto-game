name: Fetch Latest Lotto

on:
  schedule:
    - cron: '0 12 * * 6'   # 매주 토요일 21:00 KST
    - cron: '30 12 * * 6'  # 토요일 21:30 KST
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch lotto result
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import sys
          from datetime import date

          start = date(2002, 12, 7)
          today = date.today()
          round_no = (today - start).days // 7 + 1

          headers = {
              "User-Agent": "Mozilla/5.0 (Linux; Android 13; Pixel 7) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36",
              "Accept": "application/json, text/javascript, */*; q=0.01",
              "Accept-Language": "ko-KR,ko;q=0.9",
              "Referer": "https://m.dhlottery.co.kr/",
              "X-Requested-With": "XMLHttpRequest",
          }

          def fetch(r):
              url = f"https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo={r}"
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      body = resp.read().decode("utf-8")
                      print(f"Round {r} response: {body[:200]}")
                      data = json.loads(body)
                      if data.get("returnValue") == "success":
                          return data
              except Exception as e:
                  print(f"Round {r} error: {e}")
              return None

          data = fetch(round_no) or fetch(round_no - 1)

          if data:
              import os
              os.makedirs("data", exist_ok=True)
              with open("data/latest.json", "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False)
              print(f"Saved round {data['drwNo']}")
          else:
              print("All attempts failed")
              sys.exit(1)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "당첨번호 자동 업데이트 $(date +'%Y-%m-%d')"
            git push
          fi
