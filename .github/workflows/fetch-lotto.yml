name: Fetch Latest Lotto

on:
  schedule:
    - cron: '0 12 * * 6'   # 매주 토요일 21:00 KST
    - cron: '30 12 * * 6'  # 토요일 21:30 KST
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch lotto result
        run: |
          python3 << 'PYEOF'
          import requests
          import json
          import sys
          import re
          from datetime import date

          start = date(2002, 12, 7)
          today = date.today()
          round_no = (today - start).days // 7 + 1
          print(f"Target round: {round_no}")

          def fetch_naver(r):
              url = "https://search.naver.com/search.naver"
              params = {"query": f"로또 {r}회"}
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
                  "Accept-Language": "ko-KR,ko;q=0.9",
                  "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              }
              resp = requests.get(url, params=params, headers=headers, timeout=15)
              print(f"Naver status: {resp.status_code}")

              from bs4 import BeautifulSoup
              soup = BeautifulSoup(resp.text, "html.parser")

              # 네이버 로또 위젯에서 번호 추출
              # 방법 1: data-numbers 속성
              nums_el = soup.find(attrs={"data-numbers": True})
              if nums_el:
                  raw = nums_el["data-numbers"]
                  print(f"data-numbers: {raw}")

              # 방법 2: 텍스트에서 정규식으로 번호+보너스 패턴 추출
              text = soup.get_text()
              # "1 2 3 4 5 6 + 7" 패턴
              pattern = r'당첨번호.*?(\d{1,2})\D+(\d{1,2})\D+(\d{1,2})\D+(\d{1,2})\D+(\d{1,2})\D+(\d{1,2})'
              m = re.search(pattern, text, re.DOTALL)
              if m:
                  nums = [int(x) for x in m.groups()]
                  print(f"Regex match: {nums}")

              # 방법 3: 클래스명으로 볼 찾기
              candidates = []
              for sel in [".lotto645_number", ".num_group span", ".wr_num span", "strong.num"]:
                  els = soup.select(sel)
                  if els:
                      print(f"Selector '{sel}': {[e.get_text(strip=True) for e in els]}")
                      candidates = [int(e.get_text(strip=True)) for e in els if e.get_text(strip=True).isdigit() and 1 <= int(e.get_text(strip=True)) <= 45]
                      if len(candidates) >= 7:
                          break

              print(f"Candidates: {candidates}")

              # 페이지 스니펫 저장 (디버그용)
              with open("data/debug_naver.html", "w", encoding="utf-8") as f:
                  f.write(resp.text[:5000])

              return candidates

          import os
          os.makedirs("data", exist_ok=True)

          for r in [round_no, round_no - 1]:
              try:
                  nums = fetch_naver(r)
                  if len(nums) >= 7:
                      data = {
                          "returnValue": "success",
                          "drwNo": r,
                          "drwNoDate": "",
                          "drwtNo1": nums[0], "drwtNo2": nums[1], "drwtNo3": nums[2],
                          "drwtNo4": nums[3], "drwtNo5": nums[4], "drwtNo6": nums[5],
                          "bnusNo": nums[6],
                          "firstWinamnt": 0,
                          "firstPrzwnerCo": 0,
                      }
                      with open("data/latest.json", "w", encoding="utf-8") as f:
                          json.dump(data, f, ensure_ascii=False)
                      print(f"Saved round {r}: {nums}")
                      sys.exit(0)
              except Exception as e:
                  print(f"Error round {r}: {e}")

          print("All attempts failed")
          sys.exit(1)
          PYEOF

      - name: Upload debug html
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: data/debug_naver.html
          if-no-files-found: ignore

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "당첨번호 자동 업데이트 $(date +'%Y-%m-%d')"
            git push
          fi
