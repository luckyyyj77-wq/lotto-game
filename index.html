<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

    <title>행운수집기</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- 상단 제목 -->
    <header id="headerTitle">행운수집기 🎲</header>

    <!-- 메인 게임 캔버스 -->
    <div id="gameWrapper">
        <canvas id="gameCanvas" width="600" height="400"></canvas>
    </div>

    <!-- 뽑힌 번호 표시 -->
    <div id="luckyNumbers"></div>

    <!-- 공유 버튼 (6개 모이면 등장) -->
    <div id="shareButtons">
        <button onclick="shareKakao()">카카오로 공유</button>
        <button onclick="shareTwitter()">트위터</button>
        <button onclick="copyLink()">링크 복사</button>
    </div>

    <!-- 광고 영역 -->
    <div id="adArea">
        <div class="ad-box">
            광고 영역 (300×250)
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
