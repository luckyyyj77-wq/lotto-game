<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>행운수집기</title>
    <link rel="stylesheet" href="style.css" />

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6481527875589889"
            crossorigin="anonymous"></script>
</head>

<body>

    <!-- 상단 고정 배너 광고 (fixed top) -->
    <!-- AdSense 슬롯 ID 발급 후 XXXXXXXXXX 교체, 그 아래 placeholder div 삭제 -->
    <div id="topAdBar">
        <!--
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-6481527875589889"
             data-ad-slot="XXXXXXXXXX"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        -->
        <div class="ad-banner-placeholder">광고 (320×50)</div>
    </div>

    <!-- 상단 제목 + 소리 버튼 -->
    <header id="headerTitle">
        행운수집기 🎲
        <button id="muteBtn" onclick="toggleMute()" aria-label="소리 켜기/끄기">🔊</button>
    </header>

    <!-- 메인 게임 캔버스 -->
    <div id="gameWrapper">
        <canvas id="gameCanvas" width="600" height="400"></canvas>
    </div>

    <!-- 뽑힌 번호 표시 -->
    <div id="luckyNumbers"></div>

    <!-- 공유 버튼 (6개 모이면 등장) -->
    <div id="shareButtons">
        <button onclick="shareKakao()">카카오로 공유</button>
        <button onclick="shareTwitter()">트위터</button>
        <button onclick="copyLink()">링크 복사</button>
    </div>

    <!-- 하단 고정 배너 (sticky) -->
    <!-- AdSense 슬롯 ID 발급 후 XXXXXXXXXX 교체, 그 아래 placeholder div 삭제 -->
    <div id="stickyAdBar">
        <!--
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-6481527875589889"
             data-ad-slot="XXXXXXXXXX"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        -->
        <div class="ad-banner-placeholder">광고 배너 (320×50)</div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
